<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">

</head>

<body style="
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
background-size:cover;
overflow:hidden;
">

<div style="
background:rgba(0,0,0,0.65);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
width:90%;
max-width:450px;
box-sizing:border-box;
">

<h1 style="font-size:clamp(28px,6vw,48px);">💰 Clicker RP PRO</h1>

<h2 id="score">0</h2>
<h3 id="level">Level: 1</h3>

<button onclick="clicker()" style="
font-size:28px;
padding:18px 40px;
width:100%;
border:none;
border-radius:15px;
background:#ffcc00;
font-weight:bold;
cursor:pointer;
">
💰 КЛИК
</button>

<br><br>

<button onclick="profile()">👤 Профиль</button>
<button onclick="openShop()">🛒 Магазин</button>
<button onclick="openAdmin()" id="adminBtn" style="display:none;background:red;color:white;">⚙️ Админ</button>

<!-- SHOP -->
<div id="shop" style="display:none;margin-top:15px;background:#222;padding:15px;border-radius:15px;">
<h3>🛒 Магазин</h3>

<button onclick="buyBoost()">⚡ +1 за клик (100)</button>
<button onclick="buyLevel()">⭐ +1 уровень (200)</button>

</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;margin-top:15px;background:#222;padding:15px;border-radius:15px;">
<h3>⚙️ Админ панель</h3>

<input id="targetId" placeholder="ID игрока" style="padding:8px;width:90%;"><br><br>
<input id="amount" placeholder="Монеты" style="padding:8px;width:90%;"><br><br>

<button onclick="giveCoins()">➕ Выдать</button>
<button onclick="takeCoins()">➖ Забрать</button>
<button onclick="giveAdmin()">⚔️ Админка</button>
</div>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyD5KhZGttltxrkP3yNpe4joE9R6SuGw0Co",
  authDomain: "clickerrp.firebaseapp.com",
  databaseURL: "https://clickerrp-default-rtdb.firebaseio.com",
  projectId: "clickerrp",
  storageBucket: "clickerrp.firebasestorage.app",
  messagingSenderId: "610633308170",
  appId: "1:610633308170:web:e04a923c4bc6e0e05ca7f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= OWNER =================
const ownerId = "7942212896";
let currentUserId = "7942212896";

// ================= DATA =================
let score = 0;
let level = 1;
let power = 1;

// ================= LOAD =================
db.ref("players/" + currentUserId).on("value", snap => {
    let data = snap.val() || {balance:0, level:1, power:1};

    score = data.balance;
    level = data.level;
    power = data.power;

    document.getElementById("score").innerText = "💰 " + score;
    document.getElementById("level").innerText = "Level: " + level;
});

// ================= CLICK =================
function clicker(){
    score += power;

    db.ref("players/" + currentUserId).set({
        balance: score,
        level: level,
        power: power
    });
}

// ================= PROFILE =================
function profile(){
    alert("ID: " + currentUserId +
          "\nБаланс: " + score +
          "\nLevel: " + level +
          "\nСила клика: " + power);
}

// ================= SHOP =================
function openShop(){
    let s = document.getElementById("shop");
    s.style.display = s.style.display === "none" ? "block" : "none";
}

function buyBoost(){
    if(score >= 100){
        score -= 100;
        power += 1;
        save();
    }
}

function buyLevel(){
    if(score >= 200){
        score -= 200;
        level += 1;
        save();
    }
}

function save(){
    db.ref("players/" + currentUserId).set({
        balance: score,
        level: level,
        power: power
