<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker RP FULL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920&auto=format&fit=crop');
background-size:cover;
background-position:center;
overflow:hidden;
}

.main{
width:95%;
max-width:520px;
background:rgba(15,15,15,.88);
border-radius:25px;
padding:25px;
text-align:center;
color:white;
box-shadow:0 0 30px rgba(0,255,255,.25);
backdrop-filter:blur(10px);
}

h1{
margin-top:0;
font-size:32px;
color:#00ffe5;
text-shadow:0 0 15px #00ffe5;
}

#score{
font-size:48px;
font-weight:bold;
color:#00ff99;
margin-top:10px;
}

#level{
font-size:22px;
margin-bottom:20px;
color:#ddd;
}

.clickBtn{
width:100%;
padding:22px;
font-size:34px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(45deg,#00ffe5,#0066ff);
color:white;
box-shadow:0 0 25px rgba(0,255,255,.4);
transition:.15s;
}

.clickBtn:active{
transform:scale(.97);
}

.menuBtn{
padding:12px 16px;
margin:5px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:#222;
color:white;
}

.adminBtn{
background:#d62828;
}

.ownerBtn{
background:#ffb703;
color:black;
}

.panel{
display:none;
margin-top:15px;
background:#111;
padding:15px;
border-radius:15px;
border:1px solid #00ffe5;
}

.panel h3{
margin-top:0;
color:#00ffe5;
}

input{
width:90%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
font-size:16px;
}

.shopBtn{
width:100%;
margin-top:8px;
padding:14px;
font-size:18px;
background:#1f2937;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

.shopBtn:hover{
background:#374151;
}

.status{
margin-top:15px;
font-size:14px;
color:#aaa;
}

@media(max-width:600px){

body{
align-items:flex-start;
padding-top:20px;
height:auto;
min-height:100vh;
}

.main{
margin-bottom:20px;
}

.clickBtn{
font-size:28px;
padding:20px;
}

}

</style>
</head>
<body>

<div class="main">

<h1>💎 CLICKER RP</h1>

<div id="score">0</div>
<div id="level">Level: 1</div>

<button class="clickBtn" onclick="addClick()">💥 КЛИК</button>

<br><br>

<button class="menuBtn" onclick="togglePanel('shop')">🛒 Магазин</button>

<button class="menuBtn" onclick="profile()">👤 Профиль</button>

<button id="adminOpen" class="menuBtn adminBtn" onclick="togglePanel('admin')">
⚙️ Админ
</button>

<button id="ownerOpen" class="menuBtn ownerBtn" onclick="togglePanel('owner')">
👑 Owner
</button>

<!-- SHOP -->

<div id="shop" class="panel">

<h3>🛒 Магазин</h3>

<button class="shopBtn" onclick="buyPower()">
⚡ +1 Сила — 100
</button>

<button class="shopBtn" onclick="buyLevel()">
⭐ +1 Уровень — 200
</button>

</div>

<!-- ADMIN -->

<div id="admin" class="panel">

<h3>⚙️ Админ панель</h3>

<input id="adminId" placeholder="ID игрока">

<input id="adminMoney" placeholder="Монеты">

<button class="shopBtn" onclick="giveCoins()">
➕ Выдать монеты
</button>

<button class="shopBtn" onclick="takeCoins()">
➖ Забрать монеты
</button>

<button class="shopBtn" onclick="giveAdmin()">
⚔️ Выдать админку
</button>

</div>

<!-- OWNER -->

<div id="owner" class="panel">

<h3>👑 Owner панель</h3>

<input id="ownerIdInput" placeholder="ID игрока">

<button class="shopBtn" onclick="resetPlayer()">
🧨 Сбросить игрока
</button>

</div>

<div class="status" id="status">
Загрузка...
</div>

</div>

<script>

// ================= OWNER =================

const ownerId = "7942212896";
const currentUserId = "7942212896";

// ================= FIREBASE =================

const firebaseConfig = {
apiKey:"AIzaSyD5KhZGttltxrkP3yNpe4joE9R6SuGw0Co",
authDomain:"clickerrp.firebaseapp.
[27.05.2026 8:31] 🐊 Андрей 🐊: com",
databaseURL:"https://clickerrp-default-rtdb.firebaseio.com",
projectId:"clickerrp",
storageBucket:"clickerrp.firebasestorage.app",
messagingSenderId:"610633308170",
appId:"1:610633308170:web:e04a923c4bc6e0e05ca7f3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// ================= DATA =================

let score = 0;
let level = 1;
let power = 1;

// ================= UI =================

function updateUI(){

document.getElementById("score").innerText = score;

document.getElementById("level").innerText =
"Level: " + level;

}

// ================= LOAD =================

function loadData(){

db.ref("players/"+currentUserId)
.once("value")
.then((snap)=>{

const data = snap.val();

if(data){

score = data.balance || 0;
level = data.level || 1;
power = data.power || 1;

}

updateUI();

document.getElementById("status").innerText =
"✅ Firebase подключен";

})
.catch(()=>{

document.getElementById("status").innerText =
"⚠️ Firebase ошибка";

});

}

loadData();

// ================= SAVE =================

function saveData(){

db.ref("players/"+currentUserId).set({
balance:score,
level:level,
power:power
});

updateUI();

}

// ================= CLICK =================

function addClick(){

score += power;

saveData();

}

// ================= PROFILE =================

function profile(){

alert(
"🆔 ID: "+currentUserId+
"\n💰 Баланс: "+score+
"\n⭐ Уровень: "+level+
"\n⚡ Сила: "+power
);

}

// ================= PANELS =================

function togglePanel(id){

const panel = document.getElementById(id);

if(panel.style.display === "block"){
panel.style.display = "none";
}else{
panel.style.display = "block";
}

}

// ================= SHOP =================

function buyPower(){

if(score < 100){
alert("❌ Недостаточно монет");
return;
}

score -= 100;
power++;

saveData();

alert("⚡ Сила улучшена");

}

function buyLevel(){

if(score < 200){
alert("❌ Недостаточно монет");
return;
}

score -= 200;
level++;

saveData();

alert("⭐ Уровень повышен");

}

// ================= ADMIN =================

function giveCoins(){

const id =
document.getElementById("adminId").value;

const money =
Number(document.getElementById("adminMoney").value);

if(!id || !money){
alert("❌ Заполни поля");
return;
}

db.ref("players/"+id)
.once("value")
.then((snap)=>{

const data = snap.val() || {
balance:0,
level:1,
power:1
};

data.balance += money;

db.ref("players/"+id).set(data);

alert("✅ Монеты выданы");

});

}

function takeCoins(){

const id =
document.getElementById("adminId").value;

const money =
Number(document.getElementById("adminMoney").value);

if(!id || !money){
alert("❌ Заполни поля");
return;
}

db.ref("players/"+id)
.once("value")
.then((snap)=>{

const data = snap.val() || {
balance:0,
level:1,
power:1
};

data.balance -= money;

if(data.balance < 0){
data.balance = 0;
}

db.ref("players/"+id).set(data);

alert("✅ Монеты забраны");

});

}

function giveAdmin(){

const id =
document.getElementById("adminId").value;

if(!id){
alert("❌ Введите ID");
return;
}

db.ref("admins/"+id).set(true);

alert("⚔️ Админка выдана");

}

// ================= OWNER =================

function resetPlayer(){

const id =
document.getElementById("ownerIdInput").value;

if(!id){
alert("❌ Введите ID");
return;
}

db.ref("players/"+id).set({
balance:0,
level:1,
power:1
});

alert("🧨 Игрок сброшен");

}

// ================= ROLES =================

document.getElementById("adminOpen").style.display =
"inline-block";

if(currentUserId === ownerId){

document.getElementById("ownerOpen").style.display =
"inline-block";

}

</script>

</body>
</html>
