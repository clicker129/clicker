<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker RP NEON FULL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1533134486753-c833f0ed4866?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.main{
background:rgba(0,0,0,0.75);
backdrop-filter: blur(10px);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
width:92%;
max-width:550px;
box-shadow:0 0 30px rgba(0,255,255,0.2);
}

h1{color:white;text-shadow:0 0 10px cyan;}
h2{color:#00ffd5;text-shadow:0 0 10px #00ffd5;}
h3{color:#ccc;}

button{
margin:6px;
padding:10px 15px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{transform:scale(1.05);}

.click{
font-size:30px;
width:100%;
padding:18px;
background:linear-gradient(45deg,#00ffd5,#0077ff);
color:black;
box-shadow:0 0 20px rgba(0,255,255,0.5);
}

.btn{background:#222;color:white;}
.btn:hover{background:#333;}

.admin{background:#ff2e2e;color:white;}
.owner{background:#ffb300;color:black;}

.panel{
background:#111;
padding:10px;
border-radius:12px;
margin-top:10px;
border:1px solid #00ffd5;
}

@media(min-width:900px){
.main{max-width:750px;padding:40px;}
.click{font-size:45px;}
}
</style>

</head>

<body>

<div class="main">

<h1>💎 CLICKER RP FULL</h1>

<h2 id="score">0</h2>
<h3 id="level">Level: 1</h3>

<button class="click" onclick="addClick()">💥 КЛИК</button>

<br><br>

<button class="btn" onclick="profile()">👤 Профиль</button>
<button class="btn" onclick="toggleShop()">🛒 Магазин</button>
<button class="admin" onclick="openAdmin()" id="adminBtn" style="display:none;">⚙️ Админ</button>
<button class="owner" onclick="openOwner()" id="ownerBtn" style="display:none;">👑 OWNER</button>

<!-- SHOP -->
<div id="shop" class="panel" style="display:none;">
<h3>🛒 Магазин</h3>
<button class="btn" onclick="buyPower()">⚡ +1 сила (100)</button>
<button class="btn" onclick="buyLevel()">⭐ +1 уровень (200)</button>
</div>

<!-- ADMIN -->
<div id="admin" class="panel" style="display:none;">
<h3>⚙️ Админ панель</h3>

<input id="id" placeholder="ID игрока" style="width:90%;padding:6px;"><br><br>
<input id="money" placeholder="Монеты" style="width:90%;padding:6px;"><br><br>

<button class="btn" onclick="giveCoins()">➕ Выдать</button>
<button class="btn" onclick="takeCoins()">➖ Забрать</button>
<button class="admin" onclick="giveAdmin()">⚔️ Выдать админку</button>
</div>

<!-- OWNER -->
<div id="owner" class="panel" style="display:none;">
<h3>👑 OWNER ПАНЕЛЬ</h3>

<input id="o_id" placeholder="ID игрока" style="width:90%;padding:6px;"><br><br>
<input id="o_money" placeholder="Монеты" style="width:90%;padding:6px;"><br><br>

<button class="owner" onclick="ownerGiveCoins()">💰 Выдать всем силу</button>
<button class="owner" onclick="ownerReset()">🧨 Сброс игрока</button>
</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyD5KhZGttltxrkP3yNpe4joE9R6SuGw0Co",
authDomain: "clickerrp.firebaseapp.com",
databaseURL: "https://clickerrp-default-rtdb.firebaseio.com",
projectId: "clickerrp",
storageBucket: "clickerrp.firebasestorage.app",
messagingSenderId: "610633308170",
appId: "1:610633308170:web:e04a923c4bc6e0e05ca7f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// OWNER ID
const ownerId = "7942212896";
let currentUserId = "7942212896";

// DATA
let score = 0;
let level = 1;
let power = 1;

// LOAD PLAYER
db.ref("players/"+currentUserId).on("value", snap=>{
let d = snap.val() || {balance:0,level:1,power:1};

score = d.balance;
level = d.level;
power = d.power;

document.getElementById("score").innerText = "💰 " + score;
document.getElementById("level").innerText = "Level: " + level;
});
