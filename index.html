<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker RP PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.main{
background:rgba(0,0,0,0.75);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
width:90%;
max-width:450px;
box-sizing:border-box;
}

.click-btn{
font-size:26px;
padding:15px;
border:none;
border-radius:15px;
background:#ffcc00;
cursor:pointer;
width:100%;
}

.btn{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

@media(min-width:900px){
.main{max-width:700px;padding:40px;}
.click-btn{font-size:40px;}
.btn{font-size:16px;}
}
</style>

</head>

<body>

<div class="main">

<h1>💰 Clicker RP</h1>

<h2 id="score">0</h2>
<h3 id="level">Level: 1</h3>

<button class="click-btn" onclick="add()">💰 КЛИК</button>

<br><br>

<button class="btn" onclick="profile()">👤 Профиль</button>
<button class="btn" onclick="toggleShop()">🛒 Магазин</button>
<button class="btn" onclick="openAdmin()" id="adminBtn" style="display:none;background:red;color:white;">⚙️ Админ</button>

<!-- SHOP -->
<div id="shop" style="display:none;margin-top:10px;background:#222;padding:10px;border-radius:10px;">
<h3>🛒 Магазин</h3>
<button class="btn" onclick="buyPower()">⚡ +1 клик (100)</button>
<button class="btn" onclick="buyLevel()">⭐ +1 уровень (200)</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;margin-top:10px;background:#222;padding:10px;border-radius:10px;">
<h3>⚙️ Админ панель</h3>

<input id="targetId" placeholder="ID игрока" style="padding:5px;width:90%;"><br><br>
<input id="amount" placeholder="Монеты" style="padding:5px;width:90%;"><br><br>

<button class="btn" onclick="giveCoins()">➕ Выдать</button>
<button class="btn" onclick="takeCoins()">➖ Забрать</button>
<button class="btn" onclick="giveAdmin()">⚔️ Админка</button>
</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyD5KhZGttltxrkP3yNpe4joE9R6SuGw0Co",
authDomain: "clickerrp.firebaseapp.com",
databaseURL: "https://clickerrp-default-rtdb.firebaseio.com",
projectId: "clickerrp",
storageBucket: "clickerrp.firebasestorage.app",
messagingSenderId: "610633308170",
appId: "1:610633308170:web:e04a923c4bc6e0e05ca7f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// OWNER
const ownerId = "7942212896";
let currentUserId = "7942212896";

// DATA
let score = 0;
let level = 1;
let power = 1;

// LOAD
db.ref("players/" + currentUserId).on("value", snap=>{
let d = snap.val() || {balance:0,level:1,power:1};

score = d.balance;
level = d.level;
power = d.power;

document.getElementById("score").innerText = score;
document.getElementById("level").innerText = "Level: " + level;
});

// CLICK
function add(){
score += power;
save();
}

// SAVE
function save(){
db.ref("players/" + currentUserId).set({
balance:score,
level:level,
power:power
});
}

// PROFILE
function profile(){
alert("ID: "+currentUserId+"\nБаланс: "+score+"\nLevel: "+level+"\nPower: "+power);
}

// SHOP
function toggleShop(){
let s=document.getElementById("shop");
s.style.display=s.style.display==="none"?"block":"none";
}

function buyPower(){
if(score>=100){score-=100;power++;save();}
}

function buyLevel(){
if(score>=200){score-=200;level++;save();}
}

// ADMIN CHECK
function checkAdmin(){
db.ref("admins/"+currentUserId).once("value",snap=>{
if(currentUserId===ownerId || snap.val()===true){
document.getElementById("adminBtn").style.display="inline-block";
}
});
}
checkAdmin();

// ADMIN PANEL
function openAdmin(){
document.getElementById("adminPanel").style.display="block";
}

// GIVE COINS
function giveCoins(){
