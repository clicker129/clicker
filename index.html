<div class="main">

<h1>💎 CLICKER RP FULL</h1>

<h2 id="score">0</h2>
<h3 id="level">Level: 1</h3>

<button class="click" onclick="addClick()">💥 КЛИК</button>

<br><br>

<button class="btn" onclick="profile()">👤 Профиль</button>
<button class="btn" onclick="toggleShop()">🛒 Магазин</button>
<button class="admin" onclick="openAdmin()" id="adminBtn" style="display:none;">⚙️ Админ</button>

<button class="btn" onclick="buyLevel()">⭐ +1 уровень (200)</button>

<input id="o_id" placeholder="ID игрока" style="width:90%;padding:6px;"><br><br>
<input id="o_money" placeholder="Монеты" style="width:90%;padding:6px;"><br><br>

<button class="owner" onclick="ownerGiveCoins()">💰 Выдать всем силу</button>
<button class="owner" onclick="ownerReset()">🧨 Сброс игрока</button>
</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyD5KhZGttltxrkP3yNpe4joE9R6SuGw0Co",
authDomain: "clickerrp.firebaseapp.com",
databaseURL: "https://clickerrp-default-rtdb.firebaseio.com",
projectId: "clickerrp",
storageBucket: "clickerrp.firebasestorage.app",
messagingSenderId: "610633308170",
appId: "1:610633308170:web:e04a923c4bc6e0e05ca7f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// OWNER ID
const ownerId = "7942212896";
let currentUserId = "7942212896";

// DATA
let score = 0;
let level = 1;
let power = 1;

// LOAD PLAYER
db.ref("players/"+currentUserId).on("value", snap=>{
let d = snap.val() || {balance:0,level:1,power:1};

score = d.balance;
level = d.level;
power = d.power;

document.getElementById("score").innerText = "💰 " + score;
document.getElementById("level").innerText = "Level: " + level;
});

// CLICK
function addClick(){
score += power;
save();
}

// SAVE
function save(){
db.ref("players/"+currentUserId).set({
balance:score,
level:level,
power:power
});
}

// PROFILE
function profile(){
alert(
"🆔 ID: "+currentUserId+
"\n💰 Баланс: "+score+
"\n⭐ Level: "+level+
"\n⚡ Сила: "+power
);
}

// SHOP
function toggleShop(){
let s=document.getElementById("shop");

if(s.style.display==="none"){
s.style.display="block";
}else{
s.style.display="none";
}
}

function buyPower(){

if(score < 100){
alert("Недостаточно монет");
return;
}

score -= 100;
power++;
save();

alert("⚡ Сила увеличена");
}

function buyLevel(){

if(score < 200){
alert("Недостаточно монет");
return;
}

score -= 200;
level++;
save();

alert("⭐ Уровень повышен");
}

// ADMIN
function openAdmin(){

let panel=document.getElementById("admin");

if(panel.style.display==="none"){
panel.style.display="block";
}else{
panel.style.display="none";
}
}

function giveCoins(){

let id=document.getElementById("id").value;
let money=Number(document.getElementById("money").value);

if(!id || !money){
alert("Заполни поля");
return;
}

db.ref("players/"+id).once("value", snap=>{

let d=snap.val()||{
balance:0,
level:1,
power:1
};

d.balance += money;

db.ref("players/"+id).set(d);

alert("💰 Монеты выданы");

});
}

function takeCoins(){

let id=document.getElementById("id").value;
let money=Number(document.getElementById("money").value);

if(!id || !money){
alert("Заполни поля");
return;
}

db.ref("players/"+id).once("value", snap=>{

let d=snap.val()||{
balance:0,
level:1,
power:1
};

d.balance -= money;

if(d.balance < 0){
d.balance = 0;
}

db.ref("players/"+id).set(d);

alert("➖ Монеты забраны");

});
}

function giveAdmin(){

let id=document.getElementById("id").value;

if(!id){
alert("Введите ID");
return;
}

db.ref("admins/"+id).set(true);

alert("⚔️ Админка выдана");
}

// OWNER
function openOwner(){

let panel=document.getElementById("owner");

if(panel.style.display==="none"){
panel.style.display="block";
}else{
panel.style.display="none";
}
}

function ownerGiveCoins(){

let id=document.getElementById("o_id").value;

if(!id){
alert("Введите ID");
return;
}

db.ref("players/"+id).once("value", snap=>{

let d=snap.val()||{
balance:0,
level:1,
power:1
};

d.power += 10;

db.ref("players/"+id).set(d);

alert("⚡ Игроку выдана сила");

});
}

function ownerReset(){

let id=document.getElementById("o_id").value;

if(!id){
alert("Введите ID");
return;
}

db.ref("players/"+id).set({
balance:0,
level:1,
power:1
});

alert("🧨 Игрок сброшен");
}

// CHECK ROLES
function checkRoles(){

db.ref("admins/"+currentUserId).once("value", snap=>{

if(
currentUserId===ownerId ||
snap.val()===true
){
document.getElementById("adminBtn").style.display="inline-block";
}

});

if(currentUserId===ownerId){
document.getElementById("ownerBtn").style.display="inline-block";
}

}

checkRoles();

</script>
