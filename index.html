<html lang="ru">

<head>
<meta charset="UTF-8">

<body style="
margin:0;

background:url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
overflow:hidden;
">

<div style="
background:rgba(0,0,0,0.65);

text-align:center;
color:white;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
">

<h1 style="
font-size:50px;
margin-bottom:10px;
">
💰 Кликер
</h1>

<h2 id="score" style="
font-size:45px;
margin-top:0;
">
0
</h2>

<button onclick="add()" style="
font-size:30px;
padding:20px 40px;
border:none;
border-radius:20px;
background:#ffcc00;
cursor:pointer;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
">
💰 КЛИК
</button>

<br>

<button onclick="profile()" style="

">
👤 Профиль
</button>

<button onclick="shop()" style="
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:5px;
">
🛒 Магазин
</button>

<button onclick="topPlayers()" style="
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:5px;
">
🏆 Топ
</button>

<button id="adminBtn" onclick="adminPanel()" style="
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:5px;
background:red;
color:white;
display:none;
">
⚙️ Админ-панель
</button>

<div id="adminBox" style="
display:none;
margin-top:20px;
background:rgba(0,0,0,0.8);
padding:20px;
border-radius:20px;
">

<h2>⚙️ Админ-панель</h2>

<p id="roleText">
Роль: Owner
</p>

<p id="adminBalance">
💰 Баланс: 0
</p>

<button onclick="giveCoins()">
➕ Выдать 100
</button>

<button onclick="removeCoins()">
➖ Забрать 100
</button>

<br><br>

<button onclick="giveAdmin()">
⚔️ Выдать Админа
</button>

<button onclick="giveModerator()">
🔧 Выдать Модератора
</button>

<br><br>

<button onclick="removeRole()">
🚫 Снять роль
</button>

<br><br>

<button onclick="showAdmins()">
📋 Администрация
</button>

<button onclick="showUsers()">
👥 Пользователи
</button>

<br><br>

<button onclick="resetBalance()">
🗑 Сбросить баланс
</button>

<button onclick="addLevel()">
⭐ +1 Уровень
</button>

<br><br>

<button onclick="closeAdmin()">
❌ Закрыть
</button>

</div>

</div>

<script>

let ownerId = 7942212896;

let currentUserId = 7942212896;

let admins = [1];

let moderators = [];

let users = [];

let level = localStorage.getItem("level");

if(level == null){
    level = 1;
}else{
    level = parseInt(level);
}

let score = localStorage.getItem("score");

if(score == null){
    score = 0;
}else{
    score = parseInt(score);
}

document.getElementById("score").innerText = score;

users.push({
    id: currentUserId,
    balance: score,
    level: level,
    role: "👑 Owner"
});

if(
    currentUserId == ownerId ||
    admins.includes(currentUserId) ||
    moderators.includes(currentUserId)
){
    document.getElementById("adminBtn").style.display = "inline-block";
}

function add(){

    score++;

    document.getElementById("score").innerText = score;

    localStorage.setItem("score", score);

    users[0].balance = score;
}

function profile(){

    let role = "👤 Игрок";

    if(currentUserId == ownerId){
        role = "👑 Owner";
    }
    else if(admins.includes(currentUserId)){
        role = "⚔️ Админ";
    }
    else if(moderators.includes(currentUserId)){
        role = "🔧 Модератор";
    }

    alert(
        "👤 ПРОФИЛЬ\n\n" +
        "🆔 ID: " + currentUserId + "\n" +
        "💰 Баланс: " + score + "\n" +
        "⭐ Уровень: " + level + "\n" +
        "🏆 Роль: " + role
    );
}

function shop(){

    alert(
        "🛒 МАГАЗИН\n\n" +
        "Скоро появятся:\n" +
        "⚡ Бустеры\n" +
        "💎 VIP\n" +
        "🚀 Авто-клик"
    );
}

function topPlayers(){

    alert(
        "🏆 ТОП ИГРОКОВ\n\n" +
        "1. Owner — " + score + "💰"
    );
