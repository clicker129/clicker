<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кликер</title>
</head>

<body style="
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
overflow:hidden;
">

<div style="
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:25px;
text-align:center;
color:white;
width:90%;
max-width:450px;
min-width:280px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
">

<h1 style="
font-size:50px;
margin-bottom:10px;
">
💰 Кликер
</h1>

<h2 id="score" style="
font-size:clamp(30px, 7vw, 45px);
margin-top:0;
">
0
</h2>

<button onclick="add()" style="
font-size:clamp(20px, 5vw, 30px);
padding:20px 40px;
border:none;
border-radius:20px;
background:#ffcc00;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
margin-bottom:20px;
">
💰 КЛИК
</button>

<br>

<button onclick="profile()" style="
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:5px;
font-size:16px;
">
👤 Профиль
</button>

<button onclick="shop()" style="
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:5px;
font-size:16px;
">
🛒 Магазин
</button>

<button onclick="topPlayers()" style="
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:5px;
font-size:16px;
">
🏆 Топ
</button>

</div>

<script>

let score = localStorage.getItem("score");

if(score === null){
    score = 0;
}else{
    score = parseInt(score);
}

document.getElementById("score").innerText = score;

function add() {
    score++;

    document.getElementById("score").innerText = score;

    localStorage.setItem("score", score);
}

function profile(){
    alert("👤 Ваш баланс: " + score);
}

function shop(){
    alert("🛒 Магазин скоро будет");
}

function topPlayers(){
    alert("🏆 Топ игроков скоро будет");
}

</script>

</body>
</html>
