<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker RP</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body style="
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
background-size:cover;
overflow:hidden;
">

<div style="
background:rgba(0,0,0,0.65);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
width:90%;
max-width:450px;
box-sizing:border-box;
">

<h1 style="font-size:clamp(28px,6vw,50px);">💰 Clicker RP</h1>

<h2 id="score" style="font-size:clamp(30px,7vw,45px);">0</h2>

<button onclick="add()" style="
font-size:clamp(18px,5vw,28px);
padding:15px 30px;
border:none;
border-radius:15px;
background:#ffcc00;
cursor:pointer;
font-weight:bold;
">
💰 КЛИК
</button>

<br><br>

<button onclick="profile()">👤 Профиль</button>

<button onclick="openAdmin()" id="adminBtn" style="display:none;background:red;color:white;">
⚙️ Админ
</button>

<div id="adminPanel" style="
display:none;
margin-top:20px;
background:#222;
padding:15px;
border-radius:15px;
">

<h3>⚙️ Админ панель</h3>

<input id="targetId" placeholder="ID игрока" style="padding:8px;width:90%;"><br><br>
<input id="amount" placeholder="Монеты" style="padding:8px;width:90%;"><br><br>

<button onclick="giveCoins()">➕ Выдать</button>
<button onclick="takeCoins()">➖ Забрать</button>

</div>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyD5KhZGttltxrkP3yNpe4joE9R6SuGw0Co",
  authDomain: "clickerrp.firebaseapp.com",
  databaseURL: "https://clickerrp-default-rtdb.firebaseio.com",
  projectId: "clickerrp",
  storageBucket: "clickerrp.firebasestorage.app",
  messagingSenderId: "610633308170",
  appId: "1:610633308170:web:e04a923c4bc6e0e05ca7f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= OWNER =================
const ownerId = "7942212896";
let currentUserId = "7942212896";

// ================= BALANCE =================
let score = 0;

// загрузка игрока
db.ref("players/" + currentUserId).on("value", snap => {
    let data = snap.val();

    if(data){
        score = data.balance || 0;
    } else {
        db.ref("players/" + currentUserId).set({balance:0});
    }

    document.getElementById("score").innerText = score;
});

// ================= CLICK =================
function add(){
    score++;
    db.ref("players/" + currentUserId).set({balance: score});
}

// ================= PROFILE =================
function profile(){
    alert("🆔 ID: " + currentUserId + "\n💰 Баланс: " + score);
}

// ================= ADMIN =================
if(currentUserId === ownerId){
    document.getElementById("adminBtn").style.display = "inline-block";
}

function openAdmin(){
    document.getElementById("adminPanel").style.display = "block";
}

// ================= GIVE / TAKE =================
function giveCoins(){
    let id = document.getElementById("targetId").value;
    let amount = Number(document.getElementById("amount").value);

    db.ref("players/" + id).once("value", snap => {
        let data = snap.val() || {balance:0};
        data.balance += amount;
        db.ref("players/" + id).set(data);
    });
}

function takeCoins(){
    let id = document.getElementById("targetId").value;
    let amount = Number(document.getElementById("amount").value);

    db.ref("players/" + id).once("value", snap => {
        let data = snap.val() || {balance:0};
        data.balance -= amount;
        if(data.balance < 0) data.balance = 0;
        db.ref("players/" + id).set(data);
    });
}

</script>

</body>
</html>
