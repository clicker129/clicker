<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Online</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body style="font-family:Arial;background:#111;color:white;text-align:center;padding-top:50px;">

<h1>💰 Online Clicker RP</h1>

<h2 id="score">0</h2>

<button onclick="add()">💰 Клик</button>
<button onclick="profile()">👤 Профиль</button>

<br><br>

<button id="adminBtn" onclick="openAdmin()" style="display:none;background:red;color:white;">⚙️ Admin</button>

<div id="adminPanel" style="display:none;margin-top:20px;background:#222;padding:20px;border-radius:10px;">

<h3>Админ панель</h3>

<input id="targetId" placeholder="ID игрока"><br><br>
<input id="amount" placeholder="Монеты"><br><br>

<button onclick="giveCoins()">➕ Выдать</button>
<button onclick="takeCoins()">➖ Забрать</button>

<br><br>

<button onclick="giveAdmin()">⚔️ Админ</button>
<button onclick="giveMod()">🔧 Модер</button>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyD5KhZGttltxrkP3yNpe4joE9R6SuGw0Co",
  authDomain: "clickerrp.firebaseapp.com",
  databaseURL: "https://clickerrp-default-rtdb.firebaseio.com",
  projectId: "clickerrp",
  storageBucket: "clickerrp.firebasestorage.app",
  messagingSenderId: "610633308170",
  appId: "1:610633308170:web:e04a923c4bc6e0e05ca7f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= OWNER =================
const ownerId = "7942212896";
let currentUserId = "7942212896";

// ================= PLAYER =================
let score = 0;

db.ref("players/" + currentUserId).on("value", snap => {
    let data = snap.val();

    if(data){
        score = data.balance || 0;
    } else {
        db.ref("players/" + currentUserId).set({balance:0});
    }

    document.getElementById("score").innerText = score;
});

// ================= CLICK =================
function add(){
    score++;

    db.ref("players/" + currentUserId).set({
        balance: score
    });
}

// ================= PROFILE =================
function profile(){
    alert("ID: " + currentUserId + "\nБаланс: " + score);
}

// ================= ADMIN CHECK =================
if(currentUserId === ownerId){
    document.getElementById("adminBtn").style.display = "inline-block";
}

// ================= ADMIN PANEL =================
function openAdmin(){
    document.getElementById("adminPanel").style.display = "block";
}

// ================= GIVE COINS =================
function giveCoins(){
    let id = document.getElementById("targetId").value;
    let amount = Number(document.getElementById("amount").value);

    db.ref("players/" + id).once("value", snap => {
        let data = snap.val() || {balance:0};
        data.balance += amount;
        db.ref("players/" + id).set(data);
    });
}

// ================= TAKE COINS =================
function takeCoins(){
    let id = document.getElementById("targetId").value;
    let amount = Number(document.getElementById("amount").value);

    db.ref("players/" + id).once("value", snap => {
        let data = snap.val() || {balance:0};
        data.balance -= amount;
        if(data.balance < 0) data.balance = 0;
        db.ref("players/" + id).set(data);
    });
}

// ================= ROLES =================
function giveAdmin(){
    let id = document.getElementById("targetId").value;
    db.ref("admins/" + id).set(true);
    alert("Админ выдан");
}

function giveMod(){
    let id = document.getElementById("targetId").value;
    db.ref("mods/" + id).set(true);
    alert("Модер выдан");
}

</script>

</body>
</html>
